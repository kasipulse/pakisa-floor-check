<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakisa Driver - POD Entry</title>
    <style>
        :root {
            --royal-blue: #002366;
            --gold: #D4AF37;
            --white: #ffffff;
            --light-gray: #f4f4f4;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 0; margin: 0; background: var(--white); color: #333;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        .header {
            text-align: center; padding: 20px 15px; background: var(--white);
            border-bottom: 3px solid var(--gold);
        }
        .logo { max-width: 150px; height: auto; margin-bottom: 10px; }
        .company-name {
            color: var(--royal-blue); font-weight: bold; font-size: 1.4rem;
            margin: 0; text-transform: uppercase; letter-spacing: 1px;
        }
        .container { padding: 15px; flex: 1; }
        .card { 
            background: var(--white); padding: 20px; border-radius: 8px; 
            border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }
        h2 { 
            color: var(--royal-blue); font-size: 1.1rem; margin-top: 0;
            border-bottom: 1px solid var(--gold); padding-bottom: 8px;
        }
        label { font-weight: bold; display: block; margin-top: 12px; font-size: 0.85rem; color: var(--royal-blue); }
        input { 
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; 
            border-radius: 4px; box-sizing: border-box; font-size: 1rem;
        }
        .wb-item { 
            background: var(--light-gray); padding: 12px; margin: 8px 0; 
            border-radius: 4px; cursor: pointer; display: flex; 
            justify-content: space-between; border-left: 4px solid var(--royal-blue);
        }
        button { 
            width: 100%; padding: 15px; background: var(--royal-blue); 
            color: var(--white); border: none; border-radius: 4px; 
            font-weight: bold; margin-top: 20px; cursor: pointer; text-transform: uppercase;
        }
        .footer {
            text-align: center; padding: 20px; font-size: 0.75rem;
            color: #777; background: var(--light-gray); border-top: 1px solid #ddd;
        }
        #trackingStatus { font-size: 0.7rem; color: #28a745; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://res.cloudinary.com/dwxgkbuln/image/upload/v1772435702/IMG_3665_peq1ua.jpg" alt="Pakisa Logo" class="logo">
        <p class="company-name">Pakisa Logistics Express</p>
    </div>

    <div class="container">
        <div class="card" id="loginCard">
            <h2>Driver Login</h2>
            <input type="text" id="driverSearch" placeholder="Enter your name" oninput="loadTrips()">
            <div id="trackingStatus">Active Tracking Enabled</div>
        </div>

        <div id="tripContainer" class="card" style="display:none;">
            <h2>Assigned Waybills</h2>
            <div id="waybillList"></div>
        </div>

        <div id="podForm" class="card" style="display:none;">
            <h2 id="activeWb">Waybill: -</h2>
            <input type="hidden" id="currentAcc">

            <label>Recipient Name *</label>
            <input type="text" id="p5_recipient" placeholder="Full name of receiver">

            <label>ID Number</label>
            <input type="text" id="p8_id" placeholder="National ID or Passport">

            <label>Cell Number</label>
            <input type="text" id="p9_cell" placeholder="Contact number">

            <label>Delivery Details</label>
            <input type="text" id="p6_details" placeholder="e.g. Left at reception">

            <label>Discrepancy</label>
            <input type="text" id="p7_disc" placeholder="e.g. Packaging torn">

            <button onclick="submitPOD()">Submit Proof of Delivery</button>
            <button style="background:#6c757d; margin-top:10px;" onclick="cancelPOD()">Return to List</button>
        </div>
    </div>

    <div class="footer">
        &copy; 2024 Pakisa Logistics Express<br>
        Designed by Mpho Mahlaba
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIG
        const firebaseConfig = { databaseURL: "https://pakisa-floor-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let lastLat = 0;
        let lastLng = 0;
        let trackingStarted = false;

        // 1. SILENT TRACKING LOGIC
        function startSilentTracking(driverId) {
            if (trackingStarted || !navigator.geolocation) return;
            trackingStarted = true;
            document.getElementById('trackingStatus').style.display = "block";

            navigator.geolocation.watchPosition(
                (pos) => {
                    lastLat = pos.coords.latitude;
                    lastLng = pos.coords.longitude;

                    db.ref('drivers_live/' + driverId).set({
                        driverId: driverId,
                        lat: lastLat,
                        lng: lastLng,
                        accuracy: pos.coords.accuracy,
                        updatedAt: firebase.database.ServerValue.TIMESTAMP
                    });
                },
                (err) => console.warn("Location error:", err.message),
                { enableHighAccuracy: true, maximumAge: 10000 }
            );
        }

        // 2. LOAD TRIPS & TRIGGER TRACKING
        function loadTrips() {
            const name = document.getElementById('driverSearch').value.trim();
            if (name.length < 3) return;

            startSilentTracking(name);

            db.ref('tripsheets').orderByChild('driver').equalTo(name).on('value', snap => {
                const list = document.getElementById('waybillList');
                list.innerHTML = "";
                let hasTrips = false;

                snap.forEach(trip => {
                    const data = trip.val();
                    if (data.status === "active" && data.waybills) {
                        hasTrips = true;
                        data.waybills.forEach(wb => {
                            const div = document.createElement('div');
                            div.className = "wb-item";
                            div.innerHTML = `<span>${wb}</span> <span style="color:#777; font-size:0.8rem;">${data.companyId}</span>`;
                            div.onclick = () => openPOD(wb, data.companyId);
                            list.appendChild(div);
                        });
                    }
                });
                document.getElementById('tripContainer').style.display = hasTrips ? "block" : "none";
            });
        }

        function openPOD(wb, acc) {
            document.getElementById('activeWb').innerText = "Waybill: " + wb;
            document.getElementById('currentAcc').value = acc;
            document.getElementById('podForm').style.display = "block";
            document.getElementById('tripContainer').style.display = "none";
            window.scrollTo(0,0);
        }

        // 3. SUBMIT POD WITH LOCATION STAMP
        function submitPOD() {
            const wb = document.getElementById('activeWb').innerText.replace("Waybill: ", "");
            const acc = document.getElementById('currentAcc').value;
            const recipient = document.getElementById('p5_recipient').value;
            const now = new Date();

            if (!recipient) return alert("Recipient name is required.");

            const podData = {
                "1_waybill": wb,
                "2_acc_number": acc,
                "3_pod_date": now.toISOString().split('T')[0],
                "4_pod_time": now.toLocaleTimeString('en-ZA', { hour12: false }),
                "5_recipient": recipient,
                "6_details": document.getElementById('p6_details').value || "",
                "7_discrepancy": document.getElementById('p7_disc').value || "",
                "8_id_number": document.getElementById('p8_id').value || "",
                "9_cell_number": document.getElementById('p9_cell').value || "",
                "delivery_lat": lastLat,
                "delivery_lng": lastLng,
                "timestamp": firebase.database.ServerValue.TIMESTAMP
            };

            db.ref('pods').push(podData).then(() => {
                alert("Success: POD recorded.");
                location.reload(); 
            }).catch(err => alert("Error: " + err.message));
        }

        function cancelPOD() {
            document.getElementById('podForm').style.display = "none";
            document.getElementById('tripContainer').style.display = "block";
        }
    </script>
</body>
</html>
