<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakisa Admin - Dispatch & POD Export</title>

    <style>
        :root {
            --royal-blue: #002366;
            --gold: #D4AF37;
            --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 800px; margin: auto; background: #f4f4f4; color: #333; }
        .box { background: white; border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 8px; shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3 { color: var(--royal-blue); margin-top: 0; border-bottom: 2px solid var(--gold); padding-bottom: 5px; }
        label { font-weight: bold; display: block; margin-top: 10px; font-size: 0.9rem; color: var(--royal-blue); }
        input, select, textarea { width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .btn-blue { background: var(--royal-blue); color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-gold { background: var(--gold); color: white; }
        
        /* Search Result Styling */
        #statusResult { margin-top: 15px; padding: 15px; border-radius: 5px; background: #fffceb; border-left: 5px solid var(--gold); display: none; }
        .map-link { color: var(--royal-blue); font-weight: bold; text-decoration: none; border-bottom: 1px dashed var(--royal-blue); }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBh-KhkmZrS6b97MPv-YTMjU6qTF0qFzbY",
            authDomain: "pakisa-floor.firebaseapp.com",
            databaseURL: "https://pakisa-floor-default-rtdb.firebaseio.com",
            projectId: "pakisa-floor",
            storageBucket: "pakisa-floor.firebasestorage.app",
            messagingSenderId: "1003516506618",
            appId: "1:1003516506618:web:777d702f93616b6e323443",
            measurementId: "G-JBZ8DYW49B"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
</head>

<body>

    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://res.cloudinary.com/dwxgkbuln/image/upload/v1771237505/pakisa_logistics_express_pty_ltd_logo-removebg-preview_gr7h0r.png" style="max-width: 200px;">
    </div>

    <div class="box" style="border: 2px solid var(--royal-blue);">
        <h3>Waybill Status Punch</h3>
        <input type="text" id="lookupWaybill" placeholder="Enter Waybill to track location/status...">
        <button class="btn-gold" onclick="checkStatus()">Search Status</button>
        <div id="statusResult"></div>
    </div>

    <div class="box">
        <h3>1. Assign Trip (Dispatcher)</h3>
        <label>Driver Name</label>
        <input type="text" id="driverName" placeholder="Driver Name">
        <label>Select Client</label>
        <select id="companySelect"></select>
        <label>Waybills (One per line)</label>
        <textarea id="waybillList" rows="6" placeholder="WB001&#10;WB002"></textarea>
        <button class="btn-blue" onclick="handleDispatch()">Create Tripsheet</button>
    </div>

    <div class="box">
        <h3>2. Reporting</h3>
        <button class="btn-green" onclick="downloadPODReport()">Download Parcel Perfect CSV</button>
    </div>

    <script>
        // --- 1. Load Companies ---
        function initAdmin() {
            const select = document.getElementById('companySelect');
            db.ref('companies').once('value', (snap) => {
                select.innerHTML = '<option value="">-- Select Client --</option>';
                snap.forEach((child) => {
                    const data = child.val();
                    const opt = document.createElement('option');
                    opt.value = child.key;
                    opt.textContent = `${data.company} (${child.key})`;
                    select.appendChild(opt);
                });
            });
        }

        // --- 2. Create Tripsheet ---
        function handleDispatch() {
            const driver = document.getElementById('driverName').value.trim();
            const companySelect = document.getElementById('companySelect');
            const companyKey = companySelect.value;
            const companyName = companySelect.options[companySelect.selectedIndex]?.text || "";
            const wbs = document.getElementById('waybillList').value.split('\n').map(w => w.trim()).filter(w => w !== "");

            if (!driver || !companyKey || wbs.length === 0) {
                alert("Please fill in Driver, Client and Waybills.");
                return;
            }

            const tripData = {
                driver: driver,
                companyId: companyKey,
                companyName: companyName,
                status: "active",
                waybills: wbs,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            db.ref('tripsheets').push(tripData).then(() => {
                alert("✅ Tripsheet created!");
                document.getElementById('waybillList').value = "";
            });
        }

        // --- 3. WAYBILL SEARCH LOGIC (The "Punch") ---
        async function checkStatus() {
            const wb = document.getElementById('lookupWaybill').value.trim();
            const resultDiv = document.getElementById('statusResult');
            if (!wb) return;

            resultDiv.style.display = "block";
            resultDiv.innerHTML = "Searching database...";

            // Check PODS first
            const podSnap = await db.ref('pods').orderByChild('1_waybill').equalTo(wb).once('value');
            if (podSnap.exists()) {
                const data = Object.values(podSnap.val())[0];
                const googleMapsUrl = `https://www.google.com/maps?q=${data.delivery_lat},${data.delivery_lng}`;
                
                resultDiv.innerHTML = `
                    <p><strong>Waybill:</strong> ${data["1_waybill"]}</p>
                    <p><strong>Customer:</strong> ${data["2_acc_number"]}</p>
                    <p><strong>Status:</strong> <span style="color:green; font-weight:bold;">DELIVERED</span></p>
                    <p><strong>Recipient:</strong> ${data["5_recipient"]}</p>
                    <p><strong>Location:</strong> <a href="${googleMapsUrl}" target="_blank" class="map-link">📍 View Proof of Delivery Location</a></p>
                `;
                return;
            }

            // Check SCANS
            const scanSnap = await db.ref('scans').orderByChild('waybill').equalTo(wb).once('value');
            if (scanSnap.exists()) {
                const scanData = Object.values(scanSnap.val())[0];
                resultDiv.innerHTML = `
                    <p><strong>Waybill:</strong> ${scanData.waybill}</p>
                    <p><strong>Status:</strong> <span style="color:orange; font-weight:bold;">OUT FOR DELIVERY</span></p>
                    <p><strong>Floor Scan:</strong> ${new Date(scanData.timestamp).toLocaleString()}</p>
                `;
            } else {
                resultDiv.innerHTML = "No record found for this waybill.";
            }
        }

        // --- 4. CSV Export ---
        function downloadPODReport() {
            db.ref('pods').once('value', (snap) => {
                let csv = "Waybill,Acc Number,POD Date,POD Time,Recipient,Details,Discrepancy,ID number,Cell number\n";
                snap.forEach(child => {
                    const v = child.val();
                    const row = [
                        v["1_waybill"] || "",
                        v["2_acc_number"] || "",
                        v["3_pod_date"] || "",
                        v["4_pod_time"] || "",
                        `"${v["5_recipient"] || ""}"`,
                        `"${v["6_details"] || ""}"`,
                        `"${v["7_discrepancy"] || ""}"`,
                        `"${v["8_id_number"] || ""}"`,
                        `"${v["9_cell_number"] || ""}"`
                    ].join(",");
                    csv += row + "\n";
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ParcelPerfect_PODs_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
            });
        }

        window.onload = initAdmin;
    </script>

</body>
</html>
