<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Pakisa A4 Bulk Labels</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: Arial, sans-serif;
  padding:20px;
}

.controls{
  max-width:420px;
  margin-bottom:20px;
}

input, button{
  width:100%;
  padding:12px;
  margin:6px 0;
  font-size:16px;
}

/* ===== A4 GRID ===== */

#printArea{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:8mm;
}

.label{
  width:99mm;
  height:93mm;
  border:1px solid #000;
  padding:4mm;
  box-sizing:border-box;
  page-break-inside:avoid;
}

.logo{
  text-align:center;
}

.logo img{
  max-width:120px;
  max-height:40px;
}

.tracking{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin:4px 0;
  letter-spacing:1px;
}

.barcode{
  text-align:center;
  margin:4px 0;
}

.field{
  font-size:14px;
  margin:2px 0;
}

@media print{

  body *{
    visibility:hidden;
  }

  #printArea,
  #printArea *{
    visibility:visible;
  }

  #printArea{
    position:absolute;
    left:0;
    top:0;
    width:210mm;
  }

}
</style>
</head>

<body>

<div class="controls">

<h2>Pakisa A4 Label Generator</h2>

<input id="waybill" placeholder="Waybill">
<input id="destination" placeholder="Destination">
<input id="qty" type="number" placeholder="Quantity">

<button onclick="generate()">Generate Labels</button>
<button onclick="window.print()">Print</button>

</div>

<div id="printArea"></div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>

function pad(num){
  return String(num).padStart(4,'0');
}

function generate(){

  const waybill = document.getElementById('waybill').value.trim();
  const dest = document.getElementById('destination').value.trim();
  const qty = parseInt(document.getElementById('qty').value);

  const area = document.getElementById('printArea');

  area.innerHTML = '';

  if(!waybill || !dest || !qty){

    alert('Please fill all fields');

    return;

  }

  for(let i=1;i<=qty;i++){

    const piece = pad(i);

    const tracking = waybill + piece;

    const div = document.createElement('div');

    div.className = 'label';

    div.innerHTML = `

      <div class="logo">
        <img src="https://res.cloudinary.com/dwxgkbuln/image/upload/v1771237505/pakisa_logistics_express_pty_ltd_logo-removebg-preview_gr7h0r.png">
      </div>

      <div class="tracking">${tracking}</div>

      <div class="barcode">
        <svg id="bc${i}"></svg>
      </div>

      <div class="field"><b>WAYBILL:</b> ${waybill}</div>

      <div class="field"><b>DEST:</b> ${dest}</div>

      <div class="field"><b>PEACE:</b> ${i} OF ${qty}</div>

    `;

    area.appendChild(div);

    setTimeout(()=>{

      JsBarcode(`#bc${i}`, tracking, {

        format:"CODE128",
        width:2,
        height:40,
        displayValue:false

      });

    },0);

  }

}

</script>

</body>
</html>
