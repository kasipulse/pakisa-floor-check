<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pakisa Floor Check v3.0</title>
<style>
body { font-family: Arial, sans-serif; padding:20px; background:#fff; }
select, input, textarea, button { width:100%; padding:12px; margin:8px 0; font-size:16px; box-sizing:border-box; }
textarea { min-height:120px; resize:vertical; }
button { background:#0a2b52; color:#fff; border:none; border-radius:8px; cursor:pointer; }
.list-item { padding:10px; background:#f2f2f2; margin:6px 0; border-radius:8px; }
.flash { background:#2ecc71 !important; transition: background 0.1s; }
.manifest-box { background: #e8f0fe; padding: 15px; border-radius: 8px; border: 1px dashed #0a2b52; margin-bottom: 20px; }
.controls { background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
</style>

<audio id="beep" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBh-KhkmZrS6b97MPv-YTMjU6qTF0qFzbY",
  authDomain: "pakisa-floor.firebaseapp.com",
  databaseURL: "https://pakisa-floor-default-rtdb.firebaseio.com/",
  projectId: "pakisa-floor"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let allScans = []; // Global cache for filtering

onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "login.html";
  else listenForScansAndPods();
});

window.filterReport = () => {
    const cust = document.getElementById("filterCustomer").value;
    const filtered = cust ? allScans.filter(s => s.customer === cust) : allScans;
    renderList(filtered);
};

window.exportToExcel = () => {
    const cust = document.getElementById("filterCustomer").value;
    const data = cust ? allScans.filter(s => s.customer === cust) : allScans;
    const ws = XLSX.utils.json_to_sheet(data.map(d => ({ Waybill: d.waybill, Customer: d.customer, Reason: d.reason, POD: d.pod?.signedBy || 'N/A' })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Report");
    XLSX.writeFile(wb, `Report_${cust || 'All'}.xlsx`);
};

async function listenForScansAndPods() {
  const [sSnap, pSnap] = await Promise.all([get(ref(db, "scans")), get(ref(db, "pods"))]);
  const pods = pSnap.val() || {};
  allScans = [];
  sSnap.forEach(s => { const v = s.val(); allScans.push({ ...v, pod: pods[v.waybill] || null }); });
  allScans.sort((a,b) => b.timestamp - a.timestamp);
  renderList(allScans);
}

function renderList(arr) {
  document.getElementById("scanList").innerHTML = arr.slice(0,100).map(d => `
    <div class="list-item"><b>${d.waybill}</b><br>${d.customer} — ${d.reason} ${d.pod ? `<br><span style="color:green;"><b>POD:</b> ${d.pod.signedBy}</span>` : ""}</div>
  `).join("");
}

// ... Keep your existing import/saveScan functions here ...
</script>
</head>

<body>
<img src="https://res.cloudinary.com/dwxgkbuln/image/upload/v1750675472/pakisa_logistics_express_pty_ltd_logo-removebg-preview_kbuvzs.png" width="160" style="display:block; margin:auto;">

<div class="controls">
    <h3>Filter & Export</h3>
    <select id="filterCustomer" onchange="filterReport()">
        <option value="">All Customers</option>
        <option>First Freight Couriers</option>
        <option>Fedex Express</option>
        <option>BLD Couriers International</option>
        <option>Brima Logistics</option>
        <option>Seabourne Logistics</option>
        <option>ACT</option>
    </select>
    <button onclick="exportToExcel()" style="background:#2ecc71;">Download Excel Report</button>
</div>

</body>
</html>
