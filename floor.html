<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pakisa Floor Check v3.0</title>

<style>
body { font-family: Arial, sans-serif; padding:20px; background:#fff; }
select, input, textarea, button { width:100%; padding:12px; margin:8px 0; font-size:16px; box-sizing:border-box; }
textarea { min-height:120px; resize:vertical; }
button { background:#0a2b52; color:#fff; border:none; border-radius:8px; cursor:pointer; }
.list-item { padding:10px; background:#f2f2f2; margin:6px 0; border-radius:8px; }
.flash { background:#2ecc71 !important; transition: background 0.1s; }
.manifest-box { background: #e8f0fe; padding: 15px; border-radius: 8px; border: 1px dashed #0a2b52; margin-bottom: 20px; }
.report-box { background: #fff3e0; padding: 15px; border-radius: 8px; border: 1px dashed #f57c00; margin-bottom: 20px; }
</style>

<audio id="beep" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBh-KhkmZrS6b97MPv-YTMjU6qTF0qFzbY",
  authDomain: "pakisa-floor.firebaseapp.com",
  databaseURL: "https://pakisa-floor-default-rtdb.firebaseio.com/",
  projectId: "pakisa-floor"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let allScans = [];

let customer, reason, scanInput, scanList, beep, bulkPOD, bulkManifest;

onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "login.html";
  else listenForScansAndPods();
});

window.addEventListener("DOMContentLoaded", () => {
  customer = document.getElementById("customer");
  reason = document.getElementById("reason");
  scanInput = document.getElementById("scanInput");
  scanList = document.getElementById("scanList");
  beep = document.getElementById("beep");
  bulkPOD = document.getElementById("bulkPOD");
  bulkManifest = document.getElementById("bulkManifest");

  scanInput.focus();
  scanInput.addEventListener("keyup", e => {
    if (e.key === "Enter") saveScan();
  });
});

/* ---------------- ORIGINAL LOGIC ---------------- */

window.importManifest = async () => {
  const text = bulkManifest.value.trim();
  if (!text) return alert("Paste the OFD report first!");

  const lines = text.split(/\r?\n/);
  const headers = lines[0].split(/\t/).map(h => h.trim().toLowerCase());

  const idxTrack = headers.findIndex(h => h.includes("tracking no"));
  const idxAccount = headers.findIndex(h => h.includes("account"));

  if (idxTrack === -1 || idxAccount === -1)
    return alert("Missing columns!");

  const updates = {};

  lines.slice(1).forEach(line => {
    const parts = line.split(/\t/).map(p => p.trim());
    const tracking = parts[idxTrack]?.replace(/\s+/g,"");
    const acc = parts[idxAccount];

    if (tracking && acc) {
      updates[`manifest/${tracking}`] = { account: acc };
    }
  });

  await update(ref(db), updates);
  alert("Manifest loaded!");
  bulkManifest.value = "";
};

window.saveScan = async () => {
  const waybill = scanInput.value.trim();
  if (!waybill) return;

  const snap = await get(ref(db, `manifest/${waybill}`));

  if (snap.exists()) {
    const autoAcc = snap.val().account;
    for (let i = 0; i < customer.options.length; i++) {
      if (customer.options[i].text.toLowerCase().includes(autoAcc.toLowerCase())) {
        customer.selectedIndex = i;
        break;
      }
    }
  }

  if (!customer.value || !reason.value)
    return alert("Select customer and reason!");

  await push(ref(db,"scans"), {
    customer: customer.value,
    reason: reason.value,
    waybill,
    timestamp: Date.now()
  });

  try { beep.currentTime = 0; beep.play(); } catch(e){}

  scanInput.value = "";
  scanInput.focus();

  listenForScansAndPods();
};

window.importPODBulk = async () => {
  const text = bulkPOD.value.trim();
  if (!text) return alert("Paste POD data first!");

  const lines = text.split(/\r?\n/);
  const headers = lines[0].split(/\t/).map(h => h.trim().toLowerCase());

  const idxTrack = headers.findIndex(h => h.includes("tracking no"));
  const idxRecipient = headers.findIndex(h => h.includes("recipient"));

  const updates = {};

  lines.slice(1).forEach(line => {
    const parts = line.split(/\t/).map(p => p.trim());
    const waybill = parts[idxTrack]?.replace(/\s+/g,"");

    if (waybill) {
      updates[`pods/${waybill}`] = {
        waybill,
        signedBy: parts[idxRecipient] || "N/A",
        status: "Delivered",
        importedAt: Date.now()
      };
    }
  });

  await update(ref(db), updates);
  alert("PODs imported!");
  bulkPOD.value = "";

  listenForScansAndPods();
};

/* ---------------- FIXED FILTER (IMPORTANT) ---------------- */

window.filterReport = () => {
  const cust = document.getElementById("filterCustomer").value;

  const startVal = document.getElementById("startDate").value;
  const endVal = document.getElementById("endDate").value;

  const start = startVal ? new Date(startVal).getTime() : 0;
  const end = endVal ? new Date(endVal).getTime() + 86400000 : Infinity;

  const filtered = allScans.filter(s => {
    const matchCust = !cust || s.customer === cust;
    const matchDate = s.timestamp >= start && s.timestamp <= end;
    return matchCust && matchDate;
  });

  renderList(filtered);
  return filtered;
};

/* ---------------- FIXED EXCEL ---------------- */

window.exportToExcel = () => {
  const data = filterReport() || [];

  const ws = XLSX.utils.json_to_sheet(
    data.map(d => ({
      Date: new Date(d.timestamp).toLocaleString(),
      Waybill: d.waybill,
      Customer: d.customer,
      Reason: d.reason
    }))
  );

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  XLSX.writeFile(wb, "Report.xlsx"); // FIXED
};

/* ---------------- FIXED PDF ---------------- */

window.exportToPDF = async () => {
  const data = filterReport() || [];

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const tableData = data.map(d => [
    new Date(d.timestamp).toLocaleString(),
    d.waybill,
    d.customer,
    d.reason
  ]);

  doc.text("Pakisa Floor Report", 10, 10);
  doc.autoTable({
    head: [["Date","Waybill","Customer","Reason"]],
    body: tableData,
    startY: 20
  });

  doc.save("Report.pdf");
};

/* ---------------- DATA LOADING ---------------- */

async function listenForScansAndPods() {
  const [sSnap, pSnap] = await Promise.all([
    get(ref(db,"scans")),
    get(ref(db,"pods"))
  ]);

  const pods = pSnap.val() || {};
  allScans = [];

  sSnap.forEach(s => {
    const v = s.val();
    allScans.push({ ...v, pod: pods[v.waybill] || null });
  });

  allScans.sort((a,b) => b.timestamp - a.timestamp);
  renderList(allScans);
}

function renderList(arr) {
  scanList.innerHTML = arr.slice(0,100).map(d => `
    <div class="list-item">
      <b>${d.waybill}</b><br>
      ${d.customer} — ${d.reason}<br>
      <small>${new Date(d.timestamp).toLocaleString()}</small>
    </div>
  `).join("");
}

</script>
</head>

<body>

<div class="manifest-box">
  <h3>Load Manifest</h3>
  <textarea id="bulkManifest"></textarea>
  <button onclick="importManifest()">Load</button>
</div>

<h3>Scan</h3>
<select id="customer">
  <option value="">Select Customer</option>
  <option>Fedex Express</option>
</select>

<select id="reason">
  <option>Out for delivery</option>
</select>

<input id="scanInput" placeholder="Scan">

<div class="report-box">
  <button onclick="exportToExcel()">Excel</button>
  <button onclick="exportToPDF()">PDF</button>
</div>

<h3>Scans</h3>
<div id="scanList"></div>

</body>
</html>
