<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pakisa Floor Check v3.0</title>

<style>
body { font-family: Arial, sans-serif; padding:20px; background:#fff; }
select, input, textarea, button { width:100%; padding:12px; margin:8px 0; font-size:16px; box-sizing:border-box; }
textarea { min-height:120px; resize:vertical; }
button { background:#0a2b52; color:#fff; border:none; border-radius:8px; cursor:pointer; }
.list-item { padding:10px; background:#f2f2f2; margin:6px 0; border-radius:8px; }
.flash { background:#2ecc71 !important; transition: background 0.1s; }
.manifest-box { background: #e8f0fe; padding: 15px; border-radius: 8px; border: 1px dashed #0a2b52; margin-bottom: 20px; }
.report-box { background: #fff3e0; padding: 15px; border-radius: 8px; border: 1px dashed #f57c00; margin-bottom: 20px; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBh-KhkmZrS6b97MPv-YTMjU6qTF0qFzbY",
  authDomain: "pakisa-floor.firebaseapp.com",
  databaseURL: "https://pakisa-floor-default-rtdb.firebaseio.com/",
  projectId: "pakisa-floor"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let allScans = [];
let scanList;

onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "login.html";
  else listenForScansAndPods();
});

window.addEventListener("DOMContentLoaded", () => {
  scanList = document.getElementById("scanList");
});

/* ================= SAFE FILTER ================= */
window.filterReport = () => {

    const cust = document.getElementById("filterCustomer").value;

    const startVal = document.getElementById("startDate").value;
    const endVal = document.getElementById("endDate").value;

    const start = startVal ? new Date(startVal).getTime() : null;
    const end = endVal ? new Date(endVal).getTime() + 86400000 : null;

    return allScans.filter(s => {
        const matchCust = !cust || s.customer === cust;
        const matchDate = (!start || s.timestamp >= start) && (!end || s.timestamp <= end);
        return matchCust && matchDate;
    });
};

/* ================= EXCEL FIX ================= */
window.exportToExcel = () => {

    const data = filterReport();

    const ws = XLSX.utils.json_to_sheet(data.map(d => ({
        Date: new Date(d.timestamp).toLocaleDateString(),
        Waybill: d.waybill,
        Customer: d.customer,
        Reason: d.reason,
        POD: d.pod?.signedBy || "N/A"
    })));

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Report");

    XLSX.writeFile(wb, "Report.xlsx"); // FIXED
};

/* ================= PDF ================= */
window.exportToPDF = async () => {

    const data = filterReport();

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("Delivery Report", 10, 10);

    const table = data.map(d => [
        new Date(d.timestamp).toLocaleDateString(),
        d.waybill,
        d.customer,
        d.reason,
        d.pod?.signedBy || "N/A"
    ]);

    doc.autoTable({
        head: [["Date","Waybill","Customer","Reason","POD"]],
        body: table,
        startY: 20
    });

    doc.save("Report.pdf");
};

/* ================= FIXED SCAN DISPLAY ================= */
function renderList(arr) {

    scanList.innerHTML = arr.slice(0, 100).map(d => {

        const date = d.timestamp
            ? new Date(d.timestamp).toLocaleString()
            : "Date unknown";

        return `
        <div class="list-item">
            <b>${d.waybill}</b><br>
            ${d.customer} — ${d.reason}<br>
            <small>${date}</small>
            ${d.pod ? `<br><span style="color:green;"><b>POD:</b> ${d.pod.signedBy}</span>` : ""}
        </div>
        `;
    }).join("");
}

/* ================= FIREBASE ================= */
async function listenForScansAndPods() {

    const [sSnap, pSnap] = await Promise.all([
        get(ref(db, "scans")),
        get(ref(db, "pods"))
    ]);

    const pods = pSnap.val() || {};

    allScans = [];

    sSnap.forEach(s => {
        const v = s.val();
        allScans.push({
            ...v,
            pod: pods[v.waybill] || null
        });
    });

    allScans.sort((a,b) => b.timestamp - a.timestamp);

    renderList(allScans);
}

/* ================= EMAIL (SAFE SIMPLE VERSION) ================= */
window.emailReport = () => {

    const email = "odajnba@fedex.com";
    const cc = "csd@pakisalogistics.co.za";

    const body =
`Good day,

Please find the delivery report.

Regards`;

    window.location.href =
        `mailto:${email}?cc=${cc}` +
        `&subject=${encodeURIComponent("Pakisa Floor")}` +
        `&body=${encodeURIComponent(body)}`;
};

</script>
</head>

<body>

<div class="report-box">
    <h3>Reporting & Filters</h3>

    <select id="filterCustomer" onchange="renderList(filterReport())">
        <option value="">All Customers</option>
        <option>First Freight Couriers</option>
        <option>Fedex Express</option>
        <option>BLD Couriers International</option>
        <option>Brima Logistics</option>
        <option>Seabourne Logistics</option>
        <option>ACT</option>
    </select>

    <input type="date" id="startDate" onchange="renderList(filterReport())">
    <input type="date" id="endDate" onchange="renderList(filterReport())">

    <button onclick="exportToExcel()">Download Excel</button>
    <button onclick="exportToPDF()">Download PDF</button>
    <button onclick="emailReport()" style="background:#1976d2;">
        Email Report
    </button>
</div>

<h3>Scans</h3>
<div id="scanList"><i>Loading…</i></div>

</body>
</html>
