<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pakisa Floor Check</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding:20px;
  background:#fff;
}

select,
input,
textarea,
button {
  width:100%;
  padding:12px;
  margin:8px 0;
  font-size:16px;
  box-sizing:border-box;
}

select { touch-action: manipulation; }

textarea {
  min-height:120px;
  resize:vertical;
}

button {
  background:#0a2b52;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.list-item {
  padding:10px;
  background:#f2f2f2;
  margin:6px 0;
  border-radius:8px;
}

.flash {
  background:#2ecc71 !important;
  transition: background 0.2s;
}
</style>

<audio id="beep" preload="auto">
  <source src="https://www.soundjay.com/buttons/sounds/button-4.mp3?v=2" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
const companyId = localStorage.getItem("companyId");
const companyName = localStorage.getItem("companyName");

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBh-KhkmZrS6b97MPv-YTMjU6qTF0qFzbY",
  authDomain: "pakisa-floor.firebaseapp.com",
  databaseURL: "https://pakisa-floor-default-rtdb.firebaseio.com/",
  projectId: "pakisa-floor"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* DOM */
let customer, reason, scanInput, bulkInput, scanList, beep;
let currentData = [];

/* Helpers */
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function startOfTodayTs() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.getTime();
}

/* Scanner debounce */
let lastScanTime = 0;

window.addEventListener("DOMContentLoaded", () => {
  customer  = document.getElementById("customer");
  reason    = document.getElementById("reason");
  scanInput = document.getElementById("scanInput");
  bulkInput = document.getElementById("bulkInput");
  scanList  = document.getElementById("scanList");
  beep      = document.getElementById("beep");
  beep.volume = 0.35;

  const searchInput = document.getElementById("searchInput");

  listenForScansAndPods();
  scanInput.focus();

  /* Scanner-safe Enter */
  scanInput.addEventListener("keyup", e => {
    if (e.key !== "Enter") return;
    const now = Date.now();
    if (now - lastScanTime < 300) return;
    lastScanTime = now;
    e.preventDefault();
    saveScan();
  });

  /* Search safe */
  searchInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      scanInput.focus();
    }
  });

  searchInput.addEventListener("blur", () => {
    setTimeout(() => scanInput.focus(), 50);
  });
});

/* 🔥 LISTENER — TODAY SCANS + ALL PODS (SAFE MERGE) */
async function listenForScansAndPods() {
  const scansRef = ref(db, "scans");
  const podsRef = ref(db, "pods");

  // 1️⃣ Get all scans
  const scansSnap = await get(scansRef);
  const scans = [];
  scansSnap.forEach(c => {
    const val = c.val();
    // Only today
    if (val.timestamp >= startOfTodayTs()) scans.push(val);
  });

  // 2️⃣ Get all PODs
  const podsSnap = await get(podsRef);
  const pods = {};
  podsSnap.forEach(p => {
    const val = p.val();
    if (!val.waybill) return;
    // Clean waybill string (trim + remove .0 from Excel)
    const waybill = String(val.waybill).trim().replace(/\.0$/, "");
    pods[waybill] = { ...val, waybill }; // overwrite cleaned waybill
  });

  // 3️⃣ Merge scans + PODs
  const combined = [];

  // ✅ First, add all scans
  scans.forEach(s => {
    const waybill = String(s.waybill).trim().replace(/\.0$/, "");
    combined.push({
      waybill,
      customer: s.customer,
      reason: s.reason,
      timestamp: s.timestamp,
      pod: pods[waybill] || null // attach POD if exists
    });
  });

  // ✅ Then, add PODs that were NOT scanned today
  Object.values(pods).forEach(p => {
    const existsInScans = scans.some(s => String(s.waybill).trim().replace(/\.0$/, "") === p.waybill);
    if (!existsInScans) {
      combined.push({
        waybill: p.waybill,
        customer: "N/A",
        reason: "Not scanned yet",
        timestamp: p.importedAt || 0,
        pod: p
      });
    }
  });

  // 4️⃣ Sort newest first
  combined.sort((a, b) => b.timestamp - a.timestamp);

  currentData = combined; // for search/filter
  renderList(currentData);

  // 🔍 Debug tip: check if your waybill is in combined
  console.log("Check waybill 888646527112:", combined.find(d => d.waybill === "888646527112"));
}

/* RENDER LIST */
function renderList(arr) {
  scanList.innerHTML = "";
  if (!arr.length) return scanList.innerHTML = "<i>No scans or PODs</i>";

  arr.slice(0,200).forEach(d => {
    const podText = d.pod ? `<br><span style="color:green;"><b>POD:</b> Signed by ${d.pod.signedBy} — ${d.pod.date || ""} ${d.pod.time || ""}</span>` : "";
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerHTML = `<b>${d.waybill}</b><br>${d.customer} — ${d.reason}${podText}`;
    scanList.appendChild(div);
  });
}

/* SEARCH */
window.filterSearch = () => {
  const t = document.getElementById("searchInput").value.toLowerCase();
  renderList(currentData.filter(d =>
    d.waybill.toLowerCase().includes(t) ||
    d.customer.toLowerCase().includes(t) ||
    d.reason.toLowerCase().includes(t)
  ));
};

/* SINGLE SCAN */
window.saveScan = async () => {
  const waybill = scanInput.value.trim();
  if (!customer.value || !reason.value || !waybill) return scanInput.focus();

  await push(ref(db,"scans"),{
    companyId, companyName,
    customer: customer.value,
    reason: reason.value,
    waybill,
    date: todayKey(),
    timestamp: Date.now()
  });

  beep.currentTime = 0;
  beep.play();
  document.body.classList.add("flash");
  setTimeout(()=>document.body.classList.remove("flash"),150);
  scanInput.value = "";
  scanInput.focus();
};

/* BULK SCANS */
window.saveBulkScans = async () => {
  const text = bulkInput.value.trim();
  if (!customer.value || !reason.value || !text) return alert("Select customer, reason and paste waybills");

  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length>=8);
  if (!lines.length) return alert("No valid waybills");

  const updates = {};
  const baseRef = ref(db,"scans");

  lines.forEach(waybill=>{
    const key = push(baseRef).key;
    updates[`scans/${key}`] = {
      customer: customer.value,
      reason: reason.value,
      waybill,
      date: todayKey(),
      timestamp: Date.now()
    };
  });

  await update(ref(db), updates);
  bulkInput.value = "";
  beep.play();
};

/* BULK POD IMPORT */
window.importPODBulk = async () => {
  const text = document.getElementById("bulkPOD").value.trim();
  if (!text) return alert("Paste POD data first!");

  const lines = text.split(/\r?\n/);
  const updates = {};

  lines.forEach(line=>{
    if (line.toLowerCase().includes("tracking")) return;
    const parts = line.split(/\t/).map(p=>p.trim());
    if(parts.length<4) return;
    let [waybillRaw, podDateRaw, podTimeRaw, signedBy] = parts;
    const waybill = String(waybillRaw).trim().replace(/\s+/g,"").replace(/\.0$/,"");
    if(!waybill) return;
    let podTimestamp = Date.now();
    if(podDateRaw){
      const [dd,mm,yyyy] = podDateRaw.split("/").map(Number);
      let hh=0,min=0,sec=0;
      if(podTimeRaw) [hh,min,sec]=podTimeRaw.split(":").map(Number);
      podTimestamp = new Date(yyyy,mm-1,dd,hh,min,sec).getTime();
    }
    updates[`pods/${waybill}`] = {waybill,signedBy,date:podDateRaw,time:podTimeRaw,status:"Delivered",importedAt:Date.now(),podTimestamp};
  });

  if(!Object.keys(updates).length) return alert("No valid PODs found!");
  await update(ref(db), updates);
  alert("POD import complete ✅");
  document.getElementById("bulkPOD").value = "";
};

/* IMPORT POD EXCEL */
window.importPOD = () => {
  const fileInput = document.getElementById("podFile");
  if(!fileInput.files.length) return alert("Select an Excel file!");

  const reader = new FileReader();
  reader.onload = e => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data,{type:'array'});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const csv = XLSX.utils.sheet_to_csv(sheet);
    document.getElementById("bulkPOD").value = csv;
    alert("Excel loaded into POD paste area ✅");
  };
  reader.readAsArrayBuffer(fileInput.files[0]);
};
</script>
</head>

<body>

<center>
<img src="https://res.cloudinary.com/dwxgkbuln/image/upload/v1750675472/pakisa_logistics_express_pty_ltd_logo-removebg-preview_kbuvzs.png" width="160">
</center>

<h2>Floor Check</h2>

<label>Customer</label>
<select id="customer">
  <option value="">Select Customer</option>
  <option>First Freight Couriers</option>
  <option>Fedex Express</option>
  <option>AJM</option>
  <option>Brima Logistics</option>
  <option>Seabourne Logistics</option>
</select>

<label>Reason</label>
<select id="reason">
  <option value="">Select Reason</option>
  <option>Out for delivery</option>
  <option>Nobody home</option>
  <option>Incorrect phone number</option>
  <option>Bad address</option>
  <option>Missing paperwork</option>
  <option>Misroute</option>
  <option>Will be attempted on commitment date</option>
  <option>Future delivery</option>
</select>

<label>Scan Waybill</label>
<input id="scanInput" placeholder="Scan waybill" autocomplete="off">

<label>Bulk Waybill Paste</label>
<textarea id="bulkInput" placeholder="One waybill per line"></textarea>

<label>Bulk POD Paste</label>
<textarea id="bulkPOD" placeholder="Paste PODs here: Tracking No TAB POD Date TAB POD Time TAB Recipient, one per line"></textarea>
<button onclick="importPODBulk()">Import POD</button>
<button onclick="saveBulkScans()">Bulk Upload</button>

<h3>Search</h3>
<input id="searchInput" placeholder="Search…" onkeyup="filterSearch()">

<h3>Scans (Today)</h3>
<div id="scanList"><i>Loading…</i></div>

<hr>

<h3>Import POD Excel</h3>
<input type="file" id="podFile" accept=".xls,.xlsx">
<button onclick="importPOD()">Import POD</button>

<br><center><b>Built by Mpho Mahlaba</b></center>

</body>
</html>
