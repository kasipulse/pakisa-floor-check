<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pakisa Floor Check v2.2</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding:20px;
  background:#fff;
}
select, input, textarea, button {
  width:100%;
  padding:12px;
  margin:8px 0;
  font-size:16px;
  box-sizing:border-box;
}
select { touch-action: manipulation; }
textarea { min-height:120px; resize:vertical; }
button {
  background:#0a2b52;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.list-item {
  padding:10px;
  background:#f2f2f2;
  margin:6px 0;
  border-radius:8px;
}
.flash {
  background:#2ecc71 !important;
  transition: background 0.2s;
}
</style>

<!-- 🔊 STRONG SCAN SOUND -->
<audio id="beep" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="module">
const companyId = localStorage.getItem("companyId");
const companyName = localStorage.getItem("companyName");

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBh-KhkmZrS6b97MPv-YTMjU6qTF0qFzbY",
  authDomain: "pakisa-floor.firebaseapp.com",
  databaseURL: "https://pakisa-floor-default-rtdb.firebaseio.com/",
  projectId: "pakisa-floor"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* AUTH */
onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "login.html";
  else listenForScansAndPods();
});

/* DOM */
let customer, reason, scanInput, bulkInput, scanList, beep, bulkPOD;
let currentData = [];

/* 🔊 BEEP */
function playBeep() {
  try {
    beep.pause();
    beep.currentTime = 0;
    beep.play().catch(()=>{});
  } catch(e){}
}

/* Helpers */
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function startOfTodayTs() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.getTime();
}

/* Scanner debounce */
let lastScanTime = 0;

window.addEventListener("DOMContentLoaded", () => {
  customer  = document.getElementById("customer");
  reason    = document.getElementById("reason");
  scanInput = document.getElementById("scanInput");
  bulkInput = document.getElementById("bulkInput");
  scanList  = document.getElementById("scanList");
  beep      = document.getElementById("beep");
  bulkPOD   = document.getElementById("bulkPOD");

  beep.volume = 0.45;

  document.body.addEventListener("click", () => {
    beep.play().then(()=>beep.pause()).catch(()=>{});
  }, { once:true });

  const searchInput = document.getElementById("searchInput");
  scanInput.focus();

  scanInput.addEventListener("keyup", e => {
    if (e.key !== "Enter") return;
    const now = Date.now();
    if (now - lastScanTime < 250) return;
    lastScanTime = now;
    e.preventDefault();
    saveScan();
  });

  searchInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      scanInput.focus();
    }
  });

  searchInput.addEventListener("blur", () => {
    setTimeout(() => scanInput.focus(), 50);
  });
});

/* 🔥 LISTENER */
async function listenForScansAndPods() {
  const scansSnap = await get(ref(db, "scans"));
  const podsSnap  = await get(ref(db, "pods"));

  const scans = [];
  const pods  = {};

  scansSnap.forEach(c => {
    const v = c.val();
    if (v.timestamp >= startOfTodayTs()) scans.push(v);
  });

  podsSnap.forEach(p => {
    const v = p.val();
    if (!v.waybill) return;
    const wb = String(v.waybill).trim().replace(/\.0$/, "");
    pods[wb] = { ...v, waybill: wb };
  });

  const combined = [];

  scans.forEach(s => {
    const wb = String(s.waybill).trim().replace(/\.0$/, "");
    combined.push({
      waybill: wb,
      customer: s.customer,
      reason: s.reason,
      timestamp: s.timestamp,
      pod: pods[wb] || null
    });
  });

  combined.sort((a,b)=>b.timestamp-a.timestamp);
  currentData = combined;
  renderList(currentData);
}

/* RENDER */
function renderList(arr) {
  scanList.innerHTML = "";
  if (!arr.length) {
    scanList.innerHTML = "<i>No scans or PODs</i>";
    return;
  }

  arr.slice(0,200).forEach(d => {
    const podText = d.pod
      ? `<br><span style="color:green;"><b>POD:</b> Signed by ${d.pod.signedBy} — ${d.pod.date || ""} ${d.pod.time || ""}</span>`
      : "";

    const div = document.createElement("div");
    div.className = "list-item";
    div.innerHTML = `<b>${d.waybill}</b><br>${d.customer} — ${d.reason}${podText}`;
    scanList.appendChild(div);
  });
}

/* SEARCH */
window.filterSearch = () => {
  const t = document.getElementById("searchInput").value.toLowerCase();
  renderList(currentData.filter(d =>
    d.waybill.toLowerCase().includes(t) ||
    d.customer.toLowerCase().includes(t) ||
    d.reason.toLowerCase().includes(t)
  ));
};

/* SINGLE SCAN */
window.saveScan = async () => {
  const waybill = scanInput.value.trim();
  if (!customer.value || !reason.value || !waybill) return scanInput.focus();

  await push(ref(db,"scans"),{
    companyId,
    companyName,
    customer: customer.value,
    reason: reason.value,
    waybill,
    date: todayKey(),
    timestamp: Date.now()
  });

  playBeep();
  document.body.classList.add("flash");
  setTimeout(()=>document.body.classList.remove("flash"),150);

  scanInput.value = "";
  scanInput.focus();
};

/* BULK SCANS */
window.saveBulkScans = async () => {
  const text = bulkInput.value.trim();
  if (!customer.value || !reason.value || !text)
    return alert("Select customer, reason and paste waybills");

  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length>=8);
  if (!lines.length) return alert("No valid waybills");

  const updates = {};
  const baseRef = ref(db,"scans");

  lines.forEach(waybill=>{
    const key = push(baseRef).key;
    updates[`scans/${key}`] = {
      companyId,
      companyName,
      customer: customer.value,
      reason: reason.value,
      waybill,
      date: todayKey(),
      timestamp: Date.now()
    };
  });

  await update(ref(db), updates);
  bulkInput.value = "";
  playBeep();
};

/* ============================= */
/* ✅ BULK POD IMPORT */
/* ============================= */
window.importPODBulk = async () => {
  const text = bulkPOD.value.trim();
  if (!text) return alert("Paste POD data first!");

  const lines = text.split(/\r?\n/);
  const updates = {};

  lines.forEach(line => {
    if (line.toLowerCase().includes("tracking")) return;

    const parts = line.split(/\t/).map(p => p.trim());
    if (parts.length < 4) return;

    let [waybillRaw, podDateRaw, podTimeRaw, signedBy] = parts;
    const waybill = String(waybillRaw).trim().replace(/\s+/g,"").replace(/\.0$/,"");

    if (!waybill) return;

    updates[`pods/${waybill}`] = {
      waybill,
      signedBy,
      date: podDateRaw,
      time: podTimeRaw,
      status: "Delivered",
      importedAt: Date.now()
    };
  });

  if (!Object.keys(updates).length) return alert("No valid PODs found!");

  await update(ref(db), updates);
  alert("POD import complete ✅");
  bulkPOD.value = "";
};

/* ============================= */
/* ✅ RETURN NOTE */
/* ============================= */
window.generateReturnNote = () => {
  const customer = document.getElementById("returnCustomer").value;
  const reason   = document.getElementById("returnReason").value;
  const newAddr  = document.getElementById("returnAddress").value;

  if (!customer || !reason) return alert("Select customer and reason.");

  const now = new Date();

  const html = `
  <html>
  <head>
    <title>Return Note</title>
    <style>
      body { font-family: Arial; padding:20px; }
      h2 { text-align:center; color:#072760; }
      .note { border:2px solid #072760; padding:16px; margin-top:20px; border-radius:12px; }
    </style>
  </head>
  <body>
    <h2>Return Note</h2>
    <div class="note">
      <p><strong>Customer:</strong> ${customer}</p>
      <p><strong>Reason:</strong> ${reason}</p>
      ${reason === "Change of Address" && newAddr ? `<p><strong>New Address:</strong> ${newAddr}</p>` : ""}
      <p><strong>Date:</strong> ${now.toLocaleDateString()}</p>
      <p><strong>Time:</strong> ${now.toLocaleTimeString()}</p>
    </div>
    <script>window.print()</script>
  </body>
  </html>
  `;

  const w = window.open("", "_blank");
  w.document.write(html);
  w.document.close();
};
</script>
</head>

<body>
<center>
<img src="https://res.cloudinary.com/dwxgkbuln/image/upload/v1771237505/pakisa_logistics_express_pty_ltd_logo-removebg-preview_gr7h0r.png" width="160">
</center>

<h2>Floor Check</h2>

<label>Customer</label>
<select id="customer">
<option value="">Select Customer</option>
<option>First Freight Couriers</option>
<option>Fedex Express</option>
<option>AJM</option>
<option>Brima Logistics</option>
<option>Seabourne Logistics</option>
</select>

<label>Reason</label>
<select id="reason">
<option value="">Select Reason</option>
<option>Out for delivery</option>
<option>Nobody home</option>
<option>Incorrect phone number</option>
<option>Bad address</option>
<option>Missing paperwork</option>
<option>Misroute</option>
<option>Refused</option>
<option>Returned to Sender</option>
<option>Will be attempted on commitment date</option>
<option>Future delivery</option>
</select>

<label>Scan Waybill</label>
<input id="scanInput" placeholder="Scan waybill" autocomplete="off">

<label>Bulk Waybill Paste</label>
<textarea id="bulkInput" placeholder="One waybill per line"></textarea>
<button onclick="saveBulkScans()">Bulk Upload</button>

<label>Bulk POD Paste</label>
<textarea id="bulkPOD" placeholder="Tracking TAB Date TAB Time TAB Recipient"></textarea>
<button onclick="importPODBulk()">Import POD</button>

<h3>Search</h3>
<input id="searchInput" placeholder="Search…" onkeyup="filterSearch()">

<h3>Scans (Today)</h3>
<div id="scanList"><i>Loading…</i></div>

<hr>

<h3>Generate Return Note</h3>

<label>Customer</label>
<select id="returnCustomer">
<option value="">Select Customer</option>
<option>First Freight Couriers</option>
<option>Fedex Express</option>
<option>AJM</option>
<option>Brima Logistics</option>
<option>Seabourne Logistics</option>
</select>

<label>Reason for Return</label>
<select id="returnReason">
<option value="">Select Reason</option>
<option>Attention UTL</option>
<option>Change of Address</option>
<option>Refused by Customer</option>
<option>Returned to Sender</option>
</select>

<label>New Address (if applicable)</label>
<textarea id="returnAddress" placeholder="Enter new address if reason is Change of Address"></textarea>

<button onclick="generateReturnNote()">Print Return Note</button>

<br><center><b>Built by Mpho Mahlaba</b></center>
</body>
</html>
