<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pakisa Floor</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
:root {
  --navy:#072760;
  --bg:#f5f7fa;
  --card:#ffffff;
}

body {
  margin:0;
  padding:16px;
  background:var(--bg);
  font-family:Inter, Arial, sans-serif;
  color:#1f2937;
}

.container {
  max-width:700px;
  margin:0 auto;
}

.card {
  background:var(--card);
  border-radius:14px;
  padding:26px;
  box-shadow:0 6px 24px rgba(15,23,42,.08);
  text-align:center;
}

.logo {
  width:180px;
  margin-bottom:18px;
}

h1 {
  margin:0;
  font-size:22px;
  color:var(--navy);
}

.subtitle {
  font-size:14px;
  color:#6b7280;
  margin-top:6px;
}

.buttons {
  display:flex;
  gap:16px;
  margin-top:30px;
  flex-wrap:wrap;
}

.btn {
  flex:1;
  padding:14px;
  border-radius:12px;
  background:var(--navy);
  color:white;
  text-decoration:none;
  font-weight:600;
  font-size:15px;
}

.btn:hover {
  opacity:0.9;
}

footer {
  margin-top:26px;
  font-size:13px;
  color:#6b7280;
  line-height:1.6;
}

.search-section {
  margin-top:30px;
  text-align:left;
}

.search-section input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #e5e7eb;
  margin-top:8px;
  margin-bottom:12px;
}

.search-section button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:var(--navy);
  color:white;
  cursor:pointer;
}

.search-section button:hover {
  opacity:0.9;
}

.result {
  margin-top:16px;
  padding:12px;
  border-radius:10px;
  background:#e6f4ea;
  border:1px solid #064e3b;
}
</style>
</head>

<body>
<div class="container">
  <div class="card">

    <img class="logo"
      src="https://res.cloudinary.com/dwxgkbuln/image/upload/v1750675472/pakisa_logistics_express_pty_ltd_logo-removebg-preview_kbuvzs.png"
      alt="Pakisa Logo">

    <h1>Pakisa Floor System</h1>
    <div class="subtitle">Operations Portal</div>

    <div class="buttons">
      <a class="btn" href="client-login.html">Client Login</a>
      <a class="btn" href="login.html">Pakisa Agent Login</a>
    </div>

    <div class="search-section">
      <h3>Check Your Waybill</h3>
      <input type="text" id="waybillInput" placeholder="Enter your waybill number">
      <button onclick="searchWaybill()">Search</button>
      <div id="waybillResult"></div>
    </div>

    <footer>
      © 2026 Pakisa Logistics Express (Pty) Ltd<br>
      Built by Mpho Mahlaba<br>
      Version 2.1
    </footer>

  </div>
</div>

<!-- CLICK SOUND -->
<audio id="beep" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>

<script>
/* 🔥 Firebase config */
var firebaseConfig = {
  apiKey: "AIzaSyBh-KhkmZrS6b97MPv-YTMjU6qTF0qFzbY",
  authDomain: "pakisa-floor.firebaseapp.com",
  databaseURL: "https://pakisa-floor-default-rtdb.firebaseio.com",
  projectId: "pakisa-floor",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* normalize waybill */
function normalizeWaybill(str) {
  return String(str || '').trim().replace(/\.0$/, '');
}

/* 🔍 Search Waybill */
function searchWaybill() {
  const input = normalizeWaybill(document.getElementById("waybillInput").value);
  const resultDiv = document.getElementById("waybillResult");
  const beep = document.getElementById("beep");
  resultDiv.innerHTML = "";

  if (!input) {
    resultDiv.innerHTML = "<span style='color:red'>Please enter a waybill number.</span>";
    return;
  }

  const scansRef = db.ref("scans")
    .orderByChild("waybill")
    .equalTo(input)
    .once("value");

  const podsRef = db.ref("pods/" + input).once("value");

  Promise.all([scansRef, podsRef])
    .then(([scanSnap, podSnap]) => {

      if (!scanSnap.exists() && !podSnap.exists()) {
        resultDiv.innerHTML = "<span style='color:red'>Waybill not found.</span>";
        return;
      }

      /* ✅ get NEWEST scan */
      let scan = null;
      if (scanSnap.exists()) {
        const scans = Object.values(scanSnap.val());
        scans.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
        scan = scans[0];
      }

      const pod = podSnap.exists() ? podSnap.val() : null;

      const div = document.createElement("div");
      div.className = "result";
      div.innerHTML = `
        <strong>Waybill:</strong> ${input}<br>
        ${scan ? `
          <strong>Customer:</strong> ${scan.customer || "N/A"}<br>
          <strong>Reason:</strong> ${scan.reason || "N/A"}<br>
          <strong>Scanned Date:</strong> ${scan.date || "N/A"}<br>
          <strong>Scanned Time:</strong> ${scan.timestamp ? new Date(scan.timestamp).toLocaleTimeString() : "N/A"}<br>
        ` : ""}
        ${pod ? `
          <hr style="margin:8px 0;">
          <strong>Status:</strong> ${pod.status || "Delivered"}<br>
          <strong>Signed By:</strong> ${pod.signedBy || "N/A"}<br>
          <strong>POD Date:</strong> ${pod.date || "N/A"}<br>
          <strong>POD Time:</strong> ${pod.time || "N/A"}
        ` : ""}
      `;
      resultDiv.appendChild(div);

      /* 🔔 Play click sound */
      beep.pause();
      beep.currentTime = 0;
      beep.play().catch(()=>{});
    })
    .catch(err => {
      console.error(err);
      resultDiv.innerHTML = "<span style='color:red'>Error fetching waybill.</span>";
    });
}

/* auto-normalize */
document.getElementById("waybillInput").addEventListener("blur", e => {
  e.target.value = normalizeWaybill(e.target.value);
});
document.getElementById("waybillInput").addEventListener("paste", e => {
  setTimeout(() => e.target.value = normalizeWaybill(e.target.value), 50);
});
</script>

</body>
</html>
