<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pakisa Floor</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
:root {
  --navy:#072760;
  --bg:#f5f7fa;
  --card:#ffffff;
}

body {
  margin:0;
  padding:16px;
  background:var(--bg);
  font-family:Inter, Arial, sans-serif;
  color:#1f2937;
}

.container {
  max-width:700px;
  margin:0 auto;
}

.card {
  background:var(--card);
  border-radius:14px;
  padding:26px;
  box-shadow:0 6px 24px rgba(15,23,42,.08);
  text-align:center;
}

.logo {
  width:180px;
  margin-bottom:18px;
}

h1 {
  margin:0;
  font-size:22px;
  color:var(--navy);
}

.subtitle {
  font-size:14px;
  color:#6b7280;
  margin-top:6px;
}

.buttons {
  display:flex;
  gap:16px;
  margin-top:30px;
  flex-wrap:wrap;
}

.btn {
  flex:1;
  padding:14px;
  border-radius:12px;
  background:var(--navy);
  color:white;
  text-decoration:none;
  font-weight:600;
  font-size:15px;
}

.btn:hover {
  opacity:0.9;
}

footer {
  margin-top:26px;
  font-size:13px;
  color:#6b7280;
  line-height:1.6;
}

.search-section {
  margin-top:30px;
  text-align:left;
}

.search-section input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #e5e7eb;
  margin-top:8px;
  margin-bottom:12px;
}

.search-section button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:var(--navy);
  color:white;
  cursor:pointer;
}

.search-section button:hover {
  opacity:0.9;
}

.result {
  margin-top:16px;
  padding:12px;
  border-radius:10px;
  background:#e6f4ea;
  border:1px solid #064e3b;
}
</style>
</head>

<body>
<div class="container">
  <div class="card">

    <img class="logo"
      src="https://res.cloudinary.com/dwxgkbuln/image/upload/v1750675472/pakisa_logistics_express_pty_ltd_logo-removebg-preview_kbuvzs.png"
      alt="Pakisa Logo">

    <h1>Pakisa Floor System</h1>
    <div class="subtitle">Operations Portal</div>

    <div class="buttons">
      <a class="btn" href="client-login.html">Client Login</a>
      <a class="btn" href="login.html">Pakisa Agent Login</a>
    </div>

    <div class="search-section">
      <h3>Check Your Waybill</h3>
      <input type="text" id="waybillInput" placeholder="Enter your waybill number">
      <button onclick="searchWaybill()">Search</button>
      <div id="waybillResult"></div>
    </div>

    <footer>
      © 2026 Pakisa Logistics Express (Pty) Ltd<br>
      Built by Mpho Mahlaba<br>
      Version 1.13
    </footer>

  </div>
</div>

<script>
/* 🔥 Firebase config */
var firebaseConfig = {
  apiKey: "AIzaSyBh-KhkmZrS6b97MPv-YTMjU6qTF0qFzbY",
  authDomain: "pakisa-floor.firebaseapp.com",
  databaseURL: "https://pakisa-floor-default-rtdb.firebaseio.com",
  projectId: "pakisa-floor",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* Helper: normalize waybill string */
function normalizeWaybill(str) {
  return String(str || '').trim().replace(/\.0$/, '');
}

/* 🔍 Search Waybill (Scans + POD merged) */
function searchWaybill() {
  const input = normalizeWaybill(document.getElementById("waybillInput").value);
  const resultDiv = document.getElementById("waybillResult");
  resultDiv.innerHTML = "";

  if (!input) {
    resultDiv.innerHTML = "<span style='color:red'>Please enter a waybill number.</span>";
    return;
  }

  const scansRef = db.ref("scans").orderByChild("waybill").equalTo(input).once("value");
  const podsRef  = db.ref("pods").orderByChild("waybill").equalTo(input).once("value");

  Promise.all([scansRef, podsRef])
    .then(([scanSnap, podSnap]) => {

      if (!scanSnap.exists() && !podSnap.exists()) {
        resultDiv.innerHTML = "<span style='color:red'>Waybill not found.</span>";
        return;
      }

      const scan = scanSnap.exists() ? Object.values(scanSnap.val())[0] : null;
      const pod  = podSnap.exists() ? Object.values(podSnap.val())[0] : null;

      const div = document.createElement("div");
      div.className = "result";
      div.innerHTML = `
        <strong>Waybill:</strong> ${input}<br>
        ${scan ? `
          <strong>Customer:</strong> ${scan.customer}<br>
          <strong>Reason:</strong> ${scan.reason}<br>
          <strong>Scanned Date:</strong> ${scan.date}<br>
          <strong>Scanned Time:</strong> ${new Date(scan.timestamp).toLocaleTimeString()}<br>
        ` : ""}
        ${pod ? `
          <strong>Status:</strong> ${pod.status || "Delivered"}<br>
          <strong>Signed By:</strong> ${pod.signedBy || "N/A"}<br>
          <strong>POD Date:</strong> ${pod.date || "N/A"}<br>
          <strong>POD Time:</strong> ${pod.time || "N/A"}
        ` : ""}
      `;

      resultDiv.appendChild(div);
    })
    .catch(err => {
      resultDiv.innerHTML = "<span style='color:red'>Error fetching waybill.</span>";
      console.error(err);
    });
}

/* 🔥 Show all today's scans automatically */
function showTodaysScans() {
  const resultDiv = document.getElementById("waybillResult");
  resultDiv.innerHTML = "<strong>Loading today's scans...</strong>";

  const startOfToday = new Date();
  startOfToday.setHours(0,0,0,0);
  const tsToday = startOfToday.getTime();

  db.ref("scans").orderByChild("timestamp").startAt(tsToday).once("value")
    .then(snapshot => {
      if (!snapshot.exists()) {
        resultDiv.innerHTML = "<span style='color:red'>No scans for today yet.</span>";
        return;
      }

      const scans = Object.values(snapshot.val()).map(s => ({
        waybill: normalizeWaybill(s.waybill),
        customer: s.customer,
        reason: s.reason,
        timestamp: s.timestamp
      }));

      let html = "<h4>Today's Scans</h4>";
      scans.forEach(s => {
        html += `<div class="result">
          <strong>Waybill:</strong> ${s.waybill}<br>
          <strong>Customer:</strong> ${s.customer}<br>
          <strong>Reason:</strong> ${s.reason}<br>
          <strong>Time:</strong> ${new Date(s.timestamp).toLocaleTimeString()}
        </div>`;
      });

      resultDiv.innerHTML = html;
    })
    .catch(err => {
      resultDiv.innerHTML = "<span style='color:red'>Error loading today's scans.</span>";
      console.error(err);
    });
}

/* Run on page load */
window.addEventListener("DOMContentLoaded", () => {
  showTodaysScans();
});
</script>

</body>
</html>
